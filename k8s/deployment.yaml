apiVersion: apps/v1
kind: Deployment

metadata:
  name: url-shortener

spec:
  replicas: 2

  selector:
    matchLabels:
      app: url-shortener

  template:
    metadata:
      labels:
        app: url-shortener

    spec:
      containers:
        - name: url-shortener

          image: kartiksarvaiya/url-shortener:latest

          imagePullPolicy: Always

          ports:
            - containerPort: 8080

          env:
            - name: SPRING_DATASOURCE_URL
              value: jdbc:postgresql://postgres:5432/url_shortener_db

            - name: SPRING_DATASOURCE_USERNAME
              value: postgres

            - name: SPRING_DATASOURCE_PASSWORD
              value: Kartik@123

            - name: SPRING_DATA_REDIS_HOST
              value: redis

            - name: SPRING_DATA_REDIS_PORT
              value: "6379"